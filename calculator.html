<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="stylees.css">
</head>

<body>
    <div class="calculator">
        <input type="text" id="answer" class="answer">
        <button id="btn_1" class="calculator_1">1</button>
        <button id="btn_2" class="calculator_2">2</button>
        <button id="btn_3" class="calculator_3">3</button>
        <button id="btn_4" class="calculator_4">4</button>
        <button id="btn_5" class="calculator_5">5</button>
        <button id="btn_6" class="calculator_6">6</button>
        <button id="btn_7" class="calculator_7">7</button>
        <button id="btn_8" class="calculator_8">8</button>
        <button id="btn_9" class="calculator_9">9</button>
        <button id="btn_x" class="calculator_x">x</button>
        <button id="btn_+" class="btn_7">+</button>
        <button id="btn_-" class="calculator_">-</button>
        <button id="btn_*" class="btn_8">*</button>
        <button id="btn_/" class="btn_9">/</button>
        <button id="btn_0" class="calculator_0">0</button>
        <button id="btn_=" class="btn_0">=</button>
    </div>
    <script src="scripts.js"></script>
</body>

</html>
